# ZigModu Distributed Example - Docker Compose
# Multi-node cluster for testing DistributedEventBus and ClusterMembership

services:
  # Node 1 - First node in the cluster
  node1:
    build:
      context: ../..
      dockerfile: examples/distributed/Dockerfile
    container_name: zigmodu-node1
    environment:
      - NODE_ID=node1
      - PORT=9000
    ports:
      - "9000:9000"
    networks:
      - zigmodu-cluster
    command: ["node1", "9000"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Node 2 - Connects to node1
  node2:
    build:
      context: ../..
      dockerfile: examples/distributed/Dockerfile
    container_name: zigmodu-node2
    environment:
      - NODE_ID=node2
      - PORT=9001
    ports:
      - "9001:9001"
    networks:
      - zigmodu-cluster
    depends_on:
      node1:
        condition: service_healthy
    command: ["node2", "9001", "node1:9000"]

  # Node 3 - Connects to both node1 and node2
  node3:
    build:
      context: ../..
      dockerfile: examples/distributed/Dockerfile
    container_name: zigmodu-node3
    environment:
      - NODE_ID=node3
      - PORT=9002
    ports:
      - "9002:9002"
    networks:
      - zigmodu-cluster
    depends_on:
      node1:
        condition: service_healthy
      node2:
        condition: service_healthy
    command: ["node3", "9002", "node1:9000", "node2:9001"]

networks:
  zigmodu-cluster:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16