name: ZigModu CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.17.0"

jobs:
  # ── Build & Test Matrix ────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            zig-bin: zig-linux-x86_64
          - os: macos-latest
            zig-bin: zig-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-${{ runner.os }}-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq mariadb-connector-c sqlite3 || true

      - name: Check formatting
        run: zig fmt --check src/

      - name: Build library
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Check canonical API imports
        run: zig build check-api

      - name: Production hot-path gate
        run: zig build check

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: .zig-cache/

  # ── Lint & Audit ──────────────────────────────
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Zig fmt check
        run: zig fmt --check src/

  # ── Integration (full) ─────────────────────────
  integration-full:
    name: Integration (full)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev curl

      - name: Run integration probes
        run: HTTP_PORT=18080 bash scripts/ci-integration.sh

  # ── DB driver matrix (live postgres/mysql tests) ──
  test-postgres:
    name: Test (DB=postgres)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Run postgres tests
        env:
          DB: postgres
          PGconninfo: host=localhost port=5432 dbname=postgres user=postgres password=postgres
        run: zig build test

  test-mysql:
    name: Test (DB=mysql)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: secret
          MARIADB_DATABASE: zigzero_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Run mysql tests
        env:
          DB: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: secret
          MYSQL_DATABASE: zigzero_test
        run: zig build test

  # ── Benchmark ──────────────────────────────────
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Run benchmarks
        run: zig build benchmark -Doptimize=ReleaseFast

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'

  # ── Docker Build ──────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, lint]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release ────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install deps
        run: sudo apt-get install -y libpq-dev libmariadb-dev libsqlite3-dev

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifacts
        run: |
          mkdir -p release
          cp -r zig-out/bin release/
          cp -r zig-out/lib release/
          cp README.md CHANGELOG.md LICENSE release/ 2>/dev/null || true
          tar -czf zigmodu-${{ github.ref_name }}-linux-x86_64.tar.gz -C release .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: zigmodu-${{ github.ref_name }}-linux-x86_64.tar.gz
